name: Publish

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  publish:
    name: Publish npm package
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: soan-cli/package-lock.json

      - name: Install dependencies
        run: npm --prefix soan-cli ci

      - name: Install MeCab
        run: |
          sudo apt-get update
          sudo apt-get install -y mecab

      - name: Download Chuko-Wabun UniDic
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          expected_sha256="5e548c834dd043e7909c46cc20f56a9f1d80dc7ea103361bf0b4a541f77610e9"
          gh release download dict-chuko-v202512 --repo "$GITHUB_REPOSITORY" --pattern 'unidic-chuko-v202512.tar.gz'
          echo "${expected_sha256}  unidic-chuko-v202512.tar.gz" | sha256sum -c -
          tar -tzf unidic-chuko-v202512.tar.gz | awk '/(^|\/)\.\.($|\/)|^\// { print "unsafe tar path: " $0 > "/dev/stderr"; bad=1 } END { exit bad }'
          mkdir -p dictionaries
          tar -C dictionaries -xzf unidic-chuko-v202512.tar.gz

      - name: Build package
        run: npm --prefix soan-cli run build

      - name: Check formatting
        run: npm --prefix soan-cli run format:check

      - name: Run linter
        run: npm --prefix soan-cli run lint

      - name: Run typecheck
        run: npm --prefix soan-cli run typecheck

      - name: Run unit tests
        run: npm --prefix soan-cli test

      - name: Run CLI e2e
        env:
          SOAN_MECAB_DIC: ${{ github.workspace }}/dictionaries/unidic-chuko-v202512
        run: npm --prefix soan-cli run test:e2e

      - name: Run smoke
        run: npm --prefix soan-cli run smoke

      - name: Audit dependencies
        run: npm --prefix soan-cli audit

      - name: Check tag matches package version
        if: ${{ github.event_name == 'push' }}
        run: |
          version="$(node -p "require('./soan-cli/package.json').version")"
          test "${GITHUB_REF_NAME}" = "v${version}"

      - name: Verify package contents
        working-directory: soan-cli
        run: npm pack --dry-run

      - name: Check npm package version
        if: ${{ github.event_name == 'push' }}
        id: npmjs
        run: |
          version="$(node -p "require('./soan-cli/package.json').version")"
          if npm view "soan-professional-cli@${version}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check GitHub Packages version
        if: ${{ github.event_name == 'push' }}
        id: github_packages
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}
        run: |
          version="$(node -p "require('./soan-cli/package.json').version")"
          {
            echo '@kotomiya07:registry=https://npm.pkg.github.com'
            echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}"
          } >> "$NPM_CONFIG_USERCONFIG"
          if npm view "@kotomiya07/soan-professional-cli@${version}" version --registry=https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish dry run
        if: ${{ github.event_name == 'workflow_dispatch' }}
        working-directory: soan-cli
        run: npm publish --access public --dry-run

      - name: Publish GitHub Packages dry run
        if: ${{ github.event_name == 'workflow_dispatch' }}
        working-directory: soan-cli
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}
        run: |
          npm pkg set name=@kotomiya07/soan-professional-cli
          npm pkg set publishConfig.registry=https://npm.pkg.github.com
          {
            echo '@kotomiya07:registry=https://npm.pkg.github.com'
            echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}"
          } >> "$NPM_CONFIG_USERCONFIG"
          npm publish --access public --registry=https://npm.pkg.github.com --dry-run

      - name: Publish to npm
        if: ${{ github.event_name == 'push' && steps.npmjs.outputs.published != 'true' }}
        working-directory: soan-cli
        run: npm publish --access public --provenance

      - name: Verify npm registry install
        if: ${{ github.event_name == 'push' }}
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./soan-cli/package.json').version")"
          tmpdir="$(mktemp -d)"
          npm --prefix "$tmpdir" install -g "soan-professional-cli@${version}"
          PATH="$tmpdir/bin:$PATH"
          soan --version | grep "^${version}$"
          soan-cli --version | grep "^${version}$"
          soan-pro --version | grep "^${version}$"
          soan --text 'か［加］/な' --seed 7 --generated-at 2026-06-29T00:00:00.000Z --output "$tmpdir/jibo.jpg" --metadata-output "$tmpdir/jibo.json" --force
          node -e "const fs=require('fs'); const j=JSON.parse(fs.readFileSync(process.argv[1],'utf8')); if(j.selectedGlyphs[0].jibo!=='加') process.exit(1);" "$tmpdir/jibo.json"

      - name: Publish to GitHub Packages
        if: ${{ github.event_name == 'push' && steps.github_packages.outputs.published != 'true' }}
        working-directory: soan-cli
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}
        run: |
          npm pkg set name=@kotomiya07/soan-professional-cli
          npm pkg set publishConfig.registry=https://npm.pkg.github.com
          {
            echo '@kotomiya07:registry=https://npm.pkg.github.com'
            echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}"
          } >> "$NPM_CONFIG_USERCONFIG"
          npm publish --access public --registry=https://npm.pkg.github.com
