[workspace]
channels = ["conda-forge"]
platforms = ["osx-arm64"]

[dependencies]
nodejs = ">=20,<21"

[tasks]
install = "npm --prefix packages/cli install"
build = "npm --prefix packages/cli run build"
build-core = "npm --prefix packages/cli exec tsc -- -p packages/core/tsconfig.json"
test = "npm --prefix packages/cli test"
e2e = "nix shell nixpkgs#mecab -c npm --prefix packages/cli run test:e2e"
smoke = "npm --prefix packages/cli run smoke"
check = { depends-on = ["build-core", "test", "build", "e2e", "smoke"] }
demo = "node packages/demo/server.mjs"
