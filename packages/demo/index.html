<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Soan Professional CLI Demo</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        color: #1b1b1b;
        background: #f7f5f0;
      }
      main {
        max-width: 960px;
        margin: 0 auto;
        padding: 32px 20px;
      }
      label,
      textarea,
      input,
      pre {
        display: block;
        width: 100%;
        box-sizing: border-box;
      }
      textarea,
      input,
      pre {
        border: 1px solid #bbb;
        border-radius: 6px;
        padding: 10px;
        background: #fff;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Soan Professional CLI Demo</h1>
      <p>PixiJS編集UIではなく、CLIに渡すProfessional設定を確認する静的デモです。</p>
      <label>
        Text
        <textarea id="text" rows="4">か［加］/な</textarea>
      </label>
      <div class="grid">
        <label>Seed <input id="seed" value="42" /></label>
        <label>Generated at <input id="generatedAt" value="2026-06-29T00:00:00.000Z" /></label>
        <label>Page width <input id="pageWidth" value="600" /></label>
        <label>Page height <input id="pageHeight" value="900" /></label>
      </div>
      <h2>Command</h2>
      <pre id="command"></pre>
    </main>
    <script>
      const fields = ['text', 'seed', 'generatedAt', 'pageWidth', 'pageHeight'].map((id) => document.getElementById(id));
      const command = document.getElementById('command');
      function quote(value) {
        return `'${String(value).replaceAll("'", "'\\''")}'`;
      }
      function update() {
        const [text, seed, generatedAt, pageWidth, pageHeight] = fields.map((field) => field.value);
        command.textContent = [
          'soan',
          '--text',
          quote(text),
          '--seed',
          quote(seed),
          '--generated-at',
          quote(generatedAt),
          '--page-width',
          quote(pageWidth),
          '--page-height',
          quote(pageHeight),
          '--output ./demo.jpg',
          '--metadata-output ./demo.json',
          '--force',
        ].join(' ');
      }
      for (const field of fields) field.addEventListener('input', update);
      update();
    </script>
  </body>
</html>
