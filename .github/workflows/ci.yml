name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test and package smoke
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: soan-cli/package-lock.json

      - name: Install MeCab
        run: |
          sudo apt-get update
          sudo apt-get install -y mecab

      - name: Install npm dependencies
        run: npm --prefix soan-cli ci

      - name: Download Chuko-Wabun UniDic
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          expected_sha256="5e548c834dd043e7909c46cc20f56a9f1d80dc7ea103361bf0b4a541f77610e9"
          gh release download dict-chuko-v202512 --repo "$GITHUB_REPOSITORY" --pattern 'unidic-chuko-v202512.tar.gz'
          echo "${expected_sha256}  unidic-chuko-v202512.tar.gz" | sha256sum -c -
          tar -tzf unidic-chuko-v202512.tar.gz | awk '/(^|\/)\.\.($|\/)|^\// { print "unsafe tar path: " $0 > "/dev/stderr"; bad=1 } END { exit bad }'
          mkdir -p dictionaries
          tar -C dictionaries -xzf unidic-chuko-v202512.tar.gz

      - name: Build core contracts
        run: npm --prefix soan-cli exec tsc -- -p packages/core/tsconfig.json

      - name: Check formatting
        run: npm --prefix soan-cli run format:check

      - name: Run linter
        run: npm --prefix soan-cli run lint

      - name: Run typecheck
        run: npm --prefix soan-cli run typecheck

      - name: Run unit tests
        run: npm --prefix soan-cli test

      - name: Build CLI
        run: npm --prefix soan-cli run build

      - name: Run CLI e2e
        env:
          SOAN_MECAB_DIC: ${{ github.workspace }}/dictionaries/unidic-chuko-v202512
        run: npm --prefix soan-cli run test:e2e

      - name: Run smoke
        run: npm --prefix soan-cli run smoke

      - name: Audit dependencies
        run: npm --prefix soan-cli audit

      - name: Check explicit any usage
        run: |
          ! grep -RInE '\bany\b' soan-cli/src soan-cli/test package/soan/soan.d.ts packages/core/src

      - name: Pack dry run
        working-directory: soan-cli
        run: npm pack --dry-run

      - name: Packed install smoke
        shell: bash
        run: |
          set -euo pipefail
          packfile="$(cd soan-cli && npm pack --pack-destination "$RUNNER_TEMP" --silent)"
          tmpdir="$(mktemp -d)"
          npm --prefix "$tmpdir" install -g "$RUNNER_TEMP/$packfile"
          PATH="$tmpdir/bin:$PATH"
          soan --version | grep '^1\.0\.1$'
          soan-cli --version | grep '^1\.0\.1$'
          soan-pro --version | grep '^1\.0\.1$'
          soan --text 'か［加］/な' --seed 7 --generated-at 2026-06-29T00:00:00.000Z --output "$tmpdir/jibo.jpg" --metadata-output "$tmpdir/jibo.json" --force
          soan --text 'けふ/こそ' --kobun --mecab-dic "${{ github.workspace }}/dictionaries/unidic-chuko-v202512" --seed 3 --generated-at 2026-06-29T00:00:00.000Z --page-width 640 --page-height 960 --manual-positions '[{"position":0,"offsetX":14,"offsetY":-6}]' --output "$tmpdir/kobun.jpg" --metadata-output "$tmpdir/kobun.json" --force
          node -e "const fs=require('fs'); const j=JSON.parse(fs.readFileSync(process.argv[1],'utf8')); const k=JSON.parse(fs.readFileSync(process.argv[2],'utf8')); if(j.selectedGlyphs[0].jibo!=='加') process.exit(1); if(k.soanConfig.morphologyEngine!=='mecab-unidic-chuko') process.exit(2); if(k.soanConfig.pageWidth!==640 || k.manualPositions[0].offsetX!==14) process.exit(3);" "$tmpdir/jibo.json" "$tmpdir/kobun.json"

      - name: Published registry install smoke
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./soan-cli/package.json').version")"
          if ! npm view "soan-professional-cli@${version}" version >/dev/null 2>&1; then
            echo "soan-professional-cli@${version} is not published yet; skipping registry install smoke."
            exit 0
          fi
          tmpdir="$(mktemp -d)"
          npm --prefix "$tmpdir" install -g "soan-professional-cli@${version}"
          PATH="$tmpdir/bin:$PATH"
          soan --version | grep "^${version}$"
          soan-cli --version | grep "^${version}$"
          soan-pro --version | grep "^${version}$"
          soan --text 'か［加］/な' --seed 7 --generated-at 2026-06-29T00:00:00.000Z --output "$tmpdir/jibo.jpg" --metadata-output "$tmpdir/jibo.json" --force
          node -e "const fs=require('fs'); const j=JSON.parse(fs.readFileSync(process.argv[1],'utf8')); if(j.selectedGlyphs[0].jibo!=='加') process.exit(1);" "$tmpdir/jibo.json"

  package-smoke:
    name: Package smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: soan-cli/package-lock.json

      - name: Install npm dependencies
        run: npm --prefix soan-cli ci

      - name: Build CLI
        run: npm --prefix soan-cli run build

      - name: Packed global install smoke
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./soan-cli/package.json').version")"
          packfile="$(cd soan-cli && npm pack --pack-destination "$RUNNER_TEMP" --silent)"
          tmpdir="$(mktemp -d)"
          npm --prefix "$tmpdir" install -g "$RUNNER_TEMP/$packfile"
          if [ -d "$tmpdir/bin" ]; then
            PATH="$tmpdir/bin:$PATH"
          else
            PATH="$tmpdir:$PATH"
          fi
          soan --version | grep "^${version}$"
          soan-cli --version | grep "^${version}$"
          soan-pro --version | grep "^${version}$"
          soan --text 'か［加］/な' --seed 7 --generated-at 2026-06-29T00:00:00.000Z --output "$tmpdir/jibo.jpg" --metadata-output "$tmpdir/jibo.json" --force
          node -e "const fs=require('fs'); const j=JSON.parse(fs.readFileSync(process.argv[1],'utf8')); if(j.selectedGlyphs[0].jibo!=='加') process.exit(1);" "$tmpdir/jibo.json"
